name: Release

# `vX.Y.Z` etiketi push'landığında masaüstü paketlerini (macOS/Linux/Windows)
# derler ve bir GitHub Release'e yükler.
#
# NOT: Otomatik güncelleyici (tauri-plugin-updater) henüz yapılandırılmadı; bu
# yüzden imzalama adımı yok (paketler İMZASIZ). Updater eklenirse:
#   - tauri.conf.json > plugins.updater (endpoints + pubkey)
#   - burada TAURI_SIGNING_PRIVATE_KEY / _PASSWORD secret'ları
on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Sürüm rust-toolchain.toml ile hizalı.
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.96.1
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf build-essential curl wget file libssl-dev libgtk-3-dev

      - name: Install dependencies
        run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Helmio ${{ github.ref_name }}'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
