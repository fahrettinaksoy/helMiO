version: 2
updates:
  # Root + npm workspaces (backend, frontend, agent share the root lockfile).
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      npm-minor-patch:
        update-types:
          - minor
          - patch

  # GitHub Actions used in workflows.
  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: weekly

  # Base images in Dockerfiles.
  - package-ecosystem: docker
    directory: '/'
    schedule:
      interval: weekly
  - package-ecosystem: docker
    directory: '/frontend'
    schedule:
      interval: weekly
