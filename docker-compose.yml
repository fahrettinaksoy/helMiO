# Helmio — production-style compose: backend API + nginx-served frontend.
#
# Quick start:
#   cp backend/.env.example .env   # then set JWT_SECRET and HELMIO_SECRET_KEY
#   docker compose up -d --build
#   open http://localhost:8080
#
# Secrets (JWT_SECRET, HELMIO_SECRET_KEY) auto-generate and persist to the
# helmio-data volume if unset, but you SHOULD set them explicitly in production.

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      PORT: 3001
      # Browser origin allowed by CORS / Socket.IO (the frontend below).
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8080}
      JWT_SECRET: ${JWT_SECRET:-}
      JWT_TTL: ${JWT_TTL:-12h}
      HELMIO_SECRET_KEY: ${HELMIO_SECRET_KEY:-}
      HELMIO_PUBLIC_URL: ${HELMIO_PUBLIC_URL:-}
    volumes:
      - helmio-data:/app/backend/data
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - '${HELMIO_PORT:-8080}:80'
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  helmio-data:
