# Helmio TEST ortamı — yalnızca geliştirme/test içindir.
# Bu container'ların `stackvo-*` servisleriyle HİÇBİR ilgisi yoktur; onlara dokunmaz.
#
# Amaç: Supervisor KURULU OLMAYAN temiz container'lar sağlamak; böylece Helmio'nun
# Docker connector ile tespit → kurulum (apt/apk) → yapılandırma → yönetim akışı
# uçtan uca denenebilir.
#
# Başlat:  docker compose -f test/docker-compose.yml up -d
# Durdur:  docker compose -f test/docker-compose.yml down
#
# Panelde sunucu eklerken:
#   Yöntem   : Docker (exec)
#   Container: helmio-test-debian   (veya helmio-test-alpine)
#   Bağlantı : Yerel socket (/var/run/docker.sock)
name: helmio-test

services:
  debian:
    image: debian:trixie
    container_name: helmio-test-debian
    command: ["tail", "-f", "/dev/null"]
    restart: unless-stopped

  alpine:
    image: alpine:3.20
    container_name: helmio-test-alpine
    command: ["tail", "-f", "/dev/null"]
    restart: unless-stopped
